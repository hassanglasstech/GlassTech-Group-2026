name: Integration Tests

# Heavier than the unit CI: spins up a full LOCAL Supabase (Docker) so the
# real RPCs + RLS run against actual Postgres. Kept in its own workflow so it
# runs in parallel with (and doesn't slow) the fast unit gate.
on:
  push:
    branches: [main, GT-Production]
  pull_request:
    branches: [main, GT-Production]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (applies supabase/migrations)
        run: supabase start

      - name: Run integration tests (real RPCs + RLS)
        # The harness falls back to the standard local demo keys, so no secrets
        # are needed — everything runs against 127.0.0.1.
        run: npm run test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop
