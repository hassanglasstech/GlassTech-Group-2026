name: CI

# Gate: every push/PR to the live branches must type-check, lint clean (no
# ESLint errors), build, and pass all tests.
#
# NOTE (audit 2026-07 #12): this previously triggered only on the dead `nippon`
# branch and its "type-check" step was actually `vite build` (esbuild strips
# types — it does NOT type-check). Fixed below: real `tsc --noEmit` + eslint
# error gate, on the live branches.
on:
  push:
    branches: [multitenant, main]
  pull_request:
    branches: [multitenant, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type-check (real tsc, not vite build)
        run: npm run lint
      - name: Lint (ESLint — fail on errors only)
        run: npm run lint:eslint:errors
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
