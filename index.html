<head>

    <!-- ── PWA / Mobile essential meta tags ─────────────────────── -->

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GT ERP">
    <meta name="theme-color" content="#354a5f">
    <meta name="description" content="Glasstech Group ERP System">

    <!-- ── PWA manifest + icons ─────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">
 
    <!-- ── Fonts ─────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind is now compiled at BUILD time (tailwind.config.js + postcss.config.js),
         and index.css is imported in index.tsx so Vite/PostCSS process it. The old
         cdn.tailwindcss.com Play CDN + inline tailwind.config + static <link href="/index.css">
         were removed: the CDN compiled CSS in the browser on every load (slow on
         list-heavy pages + FOUC — buttons rendered as plain text until it finished). -->

    <style>
      /* ── Safe area insets (iPhone notch / home bar) ─────────── */
      :root {
        --safe-top:    env(safe-area-inset-top,    0px);
        --safe-right:  env(safe-area-inset-right,  0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left:   env(safe-area-inset-left,   0px);
      }
      body {
        padding-top:    var(--safe-top);
        padding-bottom: var(--safe-bottom);
      }

      /* ── Print styles ───────────────────────────────────────── */
      @media print {
        @page { size: A4; margin: 0; }
        .no-print  { display: none !important; }
        .print-only{ display: block !important; }
        body, html { height: auto !important; overflow: visible !important; background: white !important; margin: 0 !important; padding: 0 !important; }
        #root       { height: auto !important; overflow: visible !important; }
        /* Un-clip the app shell: #main-content (overflow-hidden + h-full) and its
           inner overflow-y-auto scroll container clip the print-only sheet on
           mobile print engines → blank / partial pages. Force them visible so the
           full A4 sheet prints. */
        #main-content { height: auto !important; max-height: none !important; overflow: visible !important; }
        #main-content * { overflow: visible !important; }
        /* Cancel mx-auto so the fixed 210mm sheet anchors to the page's left edge
           instead of being shifted off-page by a narrow flex parent on mobile. */
        .print-only { margin: 0 !important; box-shadow: none !important; }
        .print-content-wrapper { padding: 15mm !important; }
      }
      .print-only { display: none; }

      /* ── Scrollbar ──────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #eff4f9; }
      ::-webkit-scrollbar-thumb { background: #bccad6; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #9db2c3; }

      /* ── Prevent text resize on orientation change ──────────── */
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

      /* ── Prevent tap highlight on all elements ──────────────── */
      * { -webkit-tap-highlight-color: transparent; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react":           "https://esm.sh/react@^19.2.3",
        "react-dom/":      "https://esm.sh/react-dom@^19.2.3/",
        "react/":          "https://esm.sh/react@^19.2.3/",
        "react-router-dom":"https://esm.sh/react-router-dom@^7.11.0",
        "lucide-react":    "https://esm.sh/lucide-react@^0.562.0",
        "xlsx":            "https://esm.sh/xlsx@0.18.5",
        "pdfjs-dist":      "https://esm.sh/pdfjs-dist@3.11.174",
        "idb":             "https://esm.sh/idb@8.0.0"
      }
    }
    </script>
</head>
<body class="text-[#32363a] h-screen overflow-hidden antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>

    <!-- ── Register Service Worker (auto-update: new deploys take over) ─── -->
    <script>
      if ('serviceWorker' in navigator) {
        // Reload ONCE when a new service worker takes control, so a fresh deploy
        // loads immediately instead of being pinned to a stale cached bundle.
        let __gtRefreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (__gtRefreshing) return;
          __gtRefreshing = true;
          window.location.reload();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('[PWA] Service Worker registered:', reg.scope);
              reg.update();  // check for a newer sw.js on every load
              // When a new SW is found & installed, activate it immediately.
              reg.addEventListener('updatefound', () => {
                const nw = reg.installing;
                if (!nw) return;
                nw.addEventListener('statechange', () => {
                  if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                    nw.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
              // Background sync messages
              navigator.serviceWorker.addEventListener('message', (e) => {
                if (e.data?.type === 'SYNC_NOW') {
                  window.dispatchEvent(new CustomEvent('gt-sync-now'));
                }
              });
            })
            .catch(err => console.warn('[PWA] SW registration failed:', err));
        });
      }
    </script>
</body>
</html>
