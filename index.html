      @media print {
        @page {
          size: A4;
          margin: 0; /* This removes the default browser headers and footers */
        }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        body, html { 
          height: auto !important; 
          overflow: visible !important; 
          background: white !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        #root { 
          height: auto !important; 
          overflow: visible !important; 
        }
        /* Re-add content margin so printer doesn't cut off text */
        .print-content-wrapper {
          padding: 15mm !important;
        }
      }
      .print-only { display: none; }
      
      /* SAP Global Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #eff4f9; }
      ::-webkit-scrollbar-thumb { background: #bccad6; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #9db2c3; }
    </style>
